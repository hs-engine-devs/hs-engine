<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/themes/prism.css" rel="stylesheet" />
  <link rel="stylesheet" href="code-style.css">
  <title>HS Engine - Mod API</title>
  <style>
    :root {
      --primary-color: #FF0099;
      --secondary-color: #FFFFFF;
      --background-color: #2C2C2C;
      --text-color: #EAEAEA;
      --sidebar-bg-color: #111;
      --hover-bg-color: #333;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
    }

    header {
      background-color: #111;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 2rem;
      color: var(--secondary-color);
    }

    header h1 span {
      color: var(--primary-color);
    }

    nav a {
      color: var(--secondary-color);
      margin-left: 1.5rem;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    nav a:hover {
      color: var(--primary-color);
      text-shadow: 0 0 6px rgba(255, 0, 153, 0.6);
    }

    footer {
      background-color: #111;
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100%;
      background-color: var(--sidebar-bg-color);
      padding: 2rem 1rem;
      box-shadow: 2px 0 6px rgba(0,0,0,0.5);
      z-index: 1000;
    
      opacity: 0;
      pointer-events: none;
      transform: translateX(-100%);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .sidebar.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .sidebar h2 {
      color: var(--primary-color);
      font-size: 1.5rem;
    }

    .sidebar a {
      text-decoration: none;
      color: var(--text-color);
      font-weight: normal;
      padding: 5px;
    }

    .sidebar a:hover {
      color: var(--primary-color);
    }

    .sidebar-section {
      margin-top: 2rem;
    }

    .sidebar-section h3 {
      margin: 0.5rem 0;
      color: var(--primary-color);
      font-size: 1rem;
      text-transform: uppercase;
      font-weight: bold;
    }

    .content {
      margin: 0 auto;
      max-width: 960px;
      padding: 2rem;
    }

    .content h1 {
      color: var(--primary-color);
    }

    .content h3 {
      margin-top: 2rem;
      color: var(--primary-color);
    }

    .section-divider {
      width: 80%;
      margin: 2rem auto;
      border-top: 2px solid #555;
      opacity: 0.7;
    }

    .content img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0;
      border-radius: 12px;
    }

    .content p {
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><span style="color: var(--primary-color);">HS</span> Engine</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="#">Mod API</a>
        <a href="https://github.com/Gidk-g/HS-Engine?tab=readme-ov-file">GitHub</a>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <h2>Mod API</h2>

    <div class="sidebar-section">
      <h3>Start</h3>
      <a href="#" onclick="loadFile('txt/home.txt')">Home</a>
      <br>
      <a href="#" onclick="loadFile('txt/createModFolder.txt')">Create Mod Folder</a>
    </div>
  </div>

  <div class="content"></div>

  <footer>
    &copy; 2025 HS Engine
  </footer>

  <script>
    const sidebar = document.getElementById('sidebar');
    let mouseInsideSidebar = false;

    async function loadFile(fileName) {
      let i = 0;

      const response = await fetch(fileName);
      const lines = (await response.text()).split('\n');
      const contentDiv = document.querySelector('.content');
      contentDiv.innerHTML = '';

      while (i < lines.length) {
        const line = lines[i].trim();
        if (line === '') {
          i++;
          continue;
        }

        const blockStart = line.match(/^\[(.+?)\]$/);
        const blockEnd = line.match(/^\[\/(.+?)\]$/);

        if (blockStart) {
          const type = blockStart[1].toLowerCase();
          let content = '';

          i++;
          while (i < lines.length && !lines[i].trim().match(/^\[\/.+?\]$/)) {
            content += lines[i] + '\n';
            i++;
          }

          const linesArr = content.trim().split('\n');

          let element;

          switch (type) {
            case 'h1':
              element = document.createElement('h1');
              element.textContent = content.trim();
              break;
            case 'h2':
              element = document.createElement('h2');
              element.textContent = content.trim();
              break;
            case 'text':
              const rules = [
                { regex: /\*\*(.*?)\*\*/g, replacement: '<strong>$1</strong>' },
                { regex: /\*(.*?)\*/g, replacement: '<em>$1</em>' },
                { regex: /~~(.*?)~~/g, replacement: '<del>$1</del>' },
                { regex: /`(.*?)`/g, replacement: '<code>$1</code>' },
                { regex: /(^|\s)(https?:\/\/[^\s]+)/g, replacement: '$1<a href="$2" target="_blank">$2</a>' },
              ];
              element = document.createElement('p');
              rules.forEach(rule => {
                content = content.replace(rule.regex, rule.replacement);
              });
              content = content.replace(/(\r\n|\r|\n)/g, '<br>');
              element.innerHTML = content.trim();
              break;
            case 'code':
              let lang = 'haxe';
              let codeContent = '';

              if (linesArr[0].startsWith('lang=')) {
                lang = linesArr[0].split('=')[1].trim();
                codeContent = linesArr.slice(1).join('\n');
              } else {
                codeContent = linesArr.join('\n');
              }

              element = document.createElement('pre');
              element.className = `language-${lang}`;
              element.innerHTML = `<code class="language-${lang}">${Prism.util.encode(codeContent)}</code>`;
              break;
            case 'image':
              const params = {};
              linesArr.forEach(line => {
                const [key, value] = line.split('=');
                if (key && value) {
                  params[key.trim()] = value.trim();
                }
              });
              if (params.src) {
                element = document.createElement('img');
                element.src = params.src;
                element.alt = '';
                element.style.display = 'block';
                element.style.margin = '2rem auto 0 auto';

                if (params.x || params.y) {
                  const x = params.x ? `${params.x}px` : '0';
                  const y = params.y ? `${params.y}px` : '0';
                  element.style.transform = `translate(${x}, ${y})`;
                  element.style.position = 'relative';
                }

                if (params.scale) {
                  const scale = parseFloat(params.scale) || 1;
                  const newScale = scale < 1 ? scale : 1;

                  function applyScale() {
                    const naturalWidth = element.naturalWidth;
                    const naturalHeight = element.naturalHeight;
                
                    if (naturalWidth && naturalHeight) {
                      element.style.width = `${naturalWidth * newScale}px`;
                      element.style.height = `${naturalHeight * newScale}px`;
                    }
                  }

                  if (element.complete) {
                    applyScale();
                  } else {
                    element.addEventListener('load', applyScale);
                  }

                  const existingTransform = element.style.transform || '';
                  const filteredTransform = existingTransform.replace(/scale\([^)]+\)/, '').trim();
                  element.style.transform = filteredTransform;
                }
              }
              break;
          }

          if (element) contentDiv.appendChild(element);
        }

        i++;
      }

      Prism.highlightAll();
    }

    document.addEventListener('mousemove', (e) => {
      if (e.clientX < 20) {
        sidebar.classList.add('visible');
      }

      if (e.clientX > 300 && !mouseInsideSidebar) {
        sidebar.classList.remove('visible');
      }
    });

    sidebar.addEventListener('mouseenter', () => {
      mouseInsideSidebar = true;
    });

    sidebar.addEventListener('mouseleave', () => {
      mouseInsideSidebar = false;
    });

    document.addEventListener('DOMContentLoaded', (event) => {
      loadFile('txt/home.txt');
    });
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/components/prism-haxe.min.js"></script>
</body>
</html>
